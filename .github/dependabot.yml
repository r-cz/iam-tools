version: 2

multi-ecosystem-groups:
  dependency-updates:
    schedule:
      interval: 'monthly'
    labels:
      - 'dependencies'

updates:
  - package-ecosystem: 'bun'
    directory: '/'
    patterns:
      - '*'
    multi-ecosystem-group: 'dependency-updates'
    open-pull-requests-limit: 1
    versioning-strategy: 'auto'
    labels:
      - 'dependencies'

  - package-ecosystem: 'github-actions'
    directory: '/'
    patterns:
      - '*'
    multi-ecosystem-group: 'dependency-updates'
    open-pull-requests-limit: 1
